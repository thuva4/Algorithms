algorithm: "convex-hull"
function_signature:
  name: "convex_hull_count"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "square with center point"
    input: [[5, 0,0, 2,0, 0,2, 2,2, 1,1]]
    expected: 4
  - name: "triangle"
    input: [[3, 0,0, 4,0, 2,3]]
    expected: 3
  - name: "collinear points"
    input: [[3, 0,0, 1,1, 2,2]]
    expected: 2
  - name: "single point"
    input: [[1, 5,5]]
    expected: 1
  - name: "two points"
    input: [[2, 0,0, 1,1]]
    expected: 2
  - name: "pentagon"
    input: [[6, 0,0, 4,0, 5,3, 2,5, -1,3, 2,2]]
    expected: 5
