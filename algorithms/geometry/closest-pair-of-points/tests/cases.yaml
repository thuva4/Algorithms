algorithm: "closest-pair-of-points"
function_signature:
  name: "closest_pair"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple four points"
    input: [[0, 0, 3, 4, 1, 1, 4, 5]]
    expected: 2
  - name: "collinear points"
    input: [[0, 0, 2, 0, 5, 0, 9, 0]]
    expected: 4
  - name: "two points"
    input: [[0, 0, 3, 4]]
    expected: 25
  - name: "cluster of points"
    input: [[0, 0, 10, 10, 1, 0, 10, 11]]
    expected: 1
