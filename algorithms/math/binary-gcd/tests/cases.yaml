algorithm: "binary-gcd"
function_signature:
  name: "binary_gcd"
  input: [a, b]
  output: greatest_common_divisor
test_cases:
  - name: "coprime numbers"
    input: [7, 13]
    expected: 1
  - name: "one divides the other"
    input: [12, 4]
    expected: 4
  - name: "equal numbers"
    input: [6, 6]
    expected: 6
  - name: "one is zero"
    input: [0, 5]
    expected: 5
  - name: "large numbers"
    input: [48, 18]
    expected: 6
  - name: "powers of two"
    input: [16, 8]
    expected: 8
  - name: "one is one"
    input: [1, 100]
    expected: 1
