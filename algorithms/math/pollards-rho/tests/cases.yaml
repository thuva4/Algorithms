algorithm: "pollards-rho"
function_signature:
  name: "pollards_rho"
  input: [n]
  output: smallest_prime_factor
test_cases:
  - name: "small composite"
    input:
      n: 15
    expected: 3
  - name: "prime number"
    input:
      n: 13
    expected: 13
