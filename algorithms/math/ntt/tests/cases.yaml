algorithm: "ntt"
function_signature:
  name: "ntt"
  input: [data]
  output: product_coefficients
test_cases:
  - name: "simple multiplication"
    input:
      data: [2, 1, 2, 2, 3, 4]
    expected: [3, 10, 8]
  - name: "multiply by constant"
    input:
      data: [1, 5, 1, 3]
    expected: [15]
  - name: "multiply (1+x)(1+x)"
    input:
      data: [2, 1, 1, 2, 1, 1]
    expected: [1, 2, 1]
  - name: "multiply (1+2x+3x^2)(1)"
    input:
      data: [3, 1, 2, 3, 1, 1]
    expected: [1, 2, 3]
