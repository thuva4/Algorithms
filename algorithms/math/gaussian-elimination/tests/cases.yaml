algorithm: "gaussian-elimination"
function_signature:
  name: "gaussian_elimination"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "2x2 system"
    input: [[2, 1, 1, 3, 2, 1, 4]]
    expected: 3
  - name: "identity system"
    input: [[2, 1, 0, 5, 0, 1, 3]]
    expected: 8
  - name: "single equation"
    input: [[1, 2, 6]]
    expected: 3
  - name: "3x3 system"
    input: [[3, 1, 1, 1, 6, 0, 2, 1, 5, 0, 0, 3, 9]]
    expected: 6
