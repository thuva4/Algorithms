algorithm: "sparse-table"
description: "Answer range minimum queries in O(1)"
function_signature:
  name: "sparse_table"
  input: "n, array, q, queries (l, r pairs, 0-indexed)"
  output: "array of minimum values"
input_format: "n, a1..an, q, l1, r1, ..., lq, rq"
output_format: "q integers: minimum in each range"
test_cases:
  - name: "single element"
    input:
      n: 1
      array: [5]
      queries: [[0, 0]]
    expected: [5]
  - name: "full range"
    input:
      n: 5
      array: [3, 1, 4, 1, 5]
      queries: [[0, 4]]
    expected: [1]
  - name: "multiple queries"
    input:
      n: 6
      array: [7, 2, 3, 0, 5, 10]
      queries: [[0, 2], [1, 4], [3, 5], [0, 5]]
    expected: [2, 0, 0, 0]
  - name: "adjacent elements"
    input:
      n: 4
      array: [4, 3, 2, 1]
      queries: [[0, 1], [1, 2], [2, 3]]
    expected: [3, 2, 1]
  - name: "same elements"
    input:
      n: 3
      array: [5, 5, 5]
      queries: [[0, 0], [0, 2], [1, 2]]
    expected: [5, 5, 5]
