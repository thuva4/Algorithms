algorithm: "heap-operations"
function_signature:
  name: "heap_sort_via_extract"
  input: [array_of_integers]
  output: array_of_integers
test_cases:
  - name: "basic unsorted"
    input: [[4, 1, 3, 2, 5]]
    expected: [1, 2, 3, 4, 5]
  - name: "single element"
    input: [[1]]
    expected: [1]
  - name: "empty array"
    input: [[]]
    expected: []
  - name: "already sorted"
    input: [[1, 2, 3, 4]]
    expected: [1, 2, 3, 4]
  - name: "reverse sorted"
    input: [[5, 4, 3, 2, 1]]
    expected: [1, 2, 3, 4, 5]
  - name: "duplicates"
    input: [[3, 1, 3, 1, 2]]
    expected: [1, 1, 2, 3, 3]
  - name: "negative numbers"
    input: [[-2, 5, -1, 0, 3]]
    expected: [-2, -1, 0, 3, 5]
