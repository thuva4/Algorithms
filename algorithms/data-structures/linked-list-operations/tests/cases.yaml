algorithm: "linked-list-operations"
function_signature:
  name: "reverse_linked_list"
  input: [array_of_integers]
  output: array_of_integers
test_cases:
  - name: "basic reversal"
    input: [[1, 2, 3, 4, 5]]
    expected: [5, 4, 3, 2, 1]
  - name: "single element"
    input: [[1]]
    expected: [1]
  - name: "empty array"
    input: [[]]
    expected: []
  - name: "two elements"
    input: [[1, 2]]
    expected: [2, 1]
  - name: "arbitrary values"
    input: [[3, 1, 4, 1, 5]]
    expected: [5, 1, 4, 1, 3]
  - name: "negative numbers"
    input: [[-1, -2, -3]]
    expected: [-3, -2, -1]
  - name: "duplicates"
    input: [[7, 7, 7]]
    expected: [7, 7, 7]
  - name: "large range"
    input: [[100, 0, -100]]
    expected: [-100, 0, 100]
