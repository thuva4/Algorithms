algorithm: "priority-queue"
function_signature:
  name: "priority_queue_ops"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "insert and extract min"
    input: [[4, 1,5, 1,3, 1,8, 2,0]]
    expected: 3
  - name: "two inserts one extract"
    input: [[3, 1,10, 1,20, 2,0]]
    expected: 10
  - name: "extract from empty"
    input: [[1, 2,0]]
    expected: 0
  - name: "multiple extracts"
    input: [[6, 1,7, 1,2, 1,5, 2,0, 2,0, 2,0]]
    expected: 14
  - name: "single insert no extract"
    input: [[1, 1,42]]
    expected: 0
