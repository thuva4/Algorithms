algorithm: "lru-cache"
function_signature:
  name: "lru_cache"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "basic put and get"
    input: [[2, 4, 1,1,1, 1,2,2, 2,1,0, 2,3,0]]
    expected: 0
  - name: "eviction of least recently used"
    input: [[2, 5, 1,1,1, 1,2,2, 1,3,3, 2,1,0, 2,3,0]]
    expected: 2
  - name: "access refreshes recency"
    input: [[2, 6, 1,1,1, 1,2,2, 2,1,0, 1,3,3, 2,2,0, 2,1,0]]
    expected: 1
  - name: "single capacity cache"
    input: [[1, 4, 1,1,10, 1,2,20, 2,1,0, 2,2,0]]
    expected: 19
  - name: "overwrite existing key"
    input: [[2, 3, 1,1,10, 1,1,20, 2,1,0]]
    expected: 20
  - name: "all misses"
    input: [[2, 2, 2,5,0, 2,10,0]]
    expected: -2
  - name: "multiple evictions"
    input: [[2, 7, 1,1,1, 1,2,2, 1,3,3, 1,4,4, 2,1,0, 2,2,0, 2,4,0]]
    expected: 2
