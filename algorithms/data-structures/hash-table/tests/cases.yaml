algorithm: "hash-table"
function_signature:
  name: "hash_table_ops"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "basic put and get"
    input: [[3, 1,5,50, 1,10,100, 2,5,0]]
    expected: 50
  - name: "delete then get returns -1"
    input: [[4, 1,1,10, 1,2,20, 3,1,0, 2,1,0]]
    expected: -1
  - name: "overwrite existing key"
    input: [[3, 1,1,10, 1,1,20, 2,1,0]]
    expected: 20
  - name: "get nonexistent key"
    input: [[1, 2,99,0]]
    expected: -1
  - name: "multiple gets"
    input: [[4, 1,1,10, 1,2,20, 2,1,0, 2,2,0]]
    expected: 30
  - name: "delete nonexistent key is safe"
    input: [[3, 3,5,0, 1,5,50, 2,5,0]]
    expected: 50
  - name: "put delete put get same key"
    input: [[4, 1,3,30, 3,3,0, 1,3,99, 2,3,0]]
    expected: 99
  - name: "all misses"
    input: [[2, 2,1,0, 2,2,0]]
    expected: -2
