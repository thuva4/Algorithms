algorithm: "rope-data-structure"
function_signature:
  name: "rope_data_structure"
  input: [data]
  output: element_at_index
test_cases:
  - name: "basic concatenation and index"
    input:
      data: [3, 1, 2, 3, 2, 4, 5, 0]
    expected: 1
  - name: "query in second array"
    input:
      data: [3, 1, 2, 3, 2, 4, 5, 4]
    expected: 5
  - name: "query at boundary"
    input:
      data: [3, 1, 2, 3, 2, 4, 5, 3]
    expected: 4
  - name: "single element arrays"
    input:
      data: [1, 10, 1, 20, 1]
    expected: 20
  - name: "last element"
    input:
      data: [2, 7, 8, 3, 9, 10, 11, 4]
    expected: 11
