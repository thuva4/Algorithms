algorithm: "ternary-search"
function_signature:
  name: "ternary_search"
  input: [sorted_array_of_integers, target_integer]
  output: integer_index
test_cases:
  - name: "element found in middle"
    input: [[1, 3, 5, 7, 9, 11], 7]
    expected: 3
  - name: "element at beginning"
    input: [[1, 3, 5, 7, 9], 1]
    expected: 0
  - name: "element at end"
    input: [[1, 3, 5, 7, 9], 9]
    expected: 4
  - name: "element not found"
    input: [[1, 3, 5, 7, 9], 4]
    expected: -1
  - name: "single element found"
    input: [[5], 5]
    expected: 0
  - name: "single element not found"
    input: [[5], 3]
    expected: -1
  - name: "empty array"
    input: [[], 1]
    expected: -1
  - name: "element in first third"
    input: [[1, 2, 3, 4, 5, 6, 7, 8, 9], 2]
    expected: 1
  - name: "element in last third"
    input: [[1, 2, 3, 4, 5, 6, 7, 8, 9], 8]
    expected: 7
  - name: "negative numbers"
    input: [[-10, -5, 0, 3, 7], 0]
    expected: 2
