algorithm: "interpolation-search"
function_signature:
  name: "interpolation_search"
  input: [array_of_integers, integer]
  output: integer
test_cases:
  - name: "found in middle"
    input: [[1, 3, 5, 7, 9, 11], 7]
    expected: 3
  - name: "not found"
    input: [[2, 4, 6, 8], 5]
    expected: -1
  - name: "single element found"
    input: [[10], 10]
    expected: 0
  - name: "single element not found"
    input: [[10], 5]
    expected: -1
  - name: "first element"
    input: [[1, 3, 5, 7, 9], 1]
    expected: 0
  - name: "last element"
    input: [[1, 3, 5, 7, 9], 9]
    expected: 4
  - name: "empty array"
    input: [[], 5]
    expected: -1
