algorithm: "maximum-subarray-divide-conquer"
description: "Find maximum contiguous subarray sum using divide and conquer"
function_signature:
  name: "max_subarray_dc"
  input: "array of integers"
  output: "maximum subarray sum (integer)"
input_format: "n, a1, a2, ..., an"
output_format: "single integer"
test_cases:
  - name: "all positive"
    input:
      array: [1, 2, 3, 4, 5]
    expected: 15
  - name: "mixed"
    input:
      array: [-2, 1, -3, 4, -1, 2, 1, -5, 4]
    expected: 6
  - name: "all negative"
    input:
      array: [-3, -5, -1, -8]
    expected: -1
  - name: "single element"
    input:
      array: [42]
    expected: 42
  - name: "two elements"
    input:
      array: [-1, 3]
    expected: 3
  - name: "crossing midpoint"
    input:
      array: [1, -1, 1, -1, 5]
    expected: 5
