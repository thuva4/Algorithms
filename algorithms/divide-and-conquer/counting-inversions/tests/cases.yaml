algorithm: "counting-inversions"
function_signature:
  name: "count_inversions"
  input: [array]
  output: inversion_count
test_cases:
  - name: "basic unsorted"
    input: [[2, 4, 1, 3, 5]]
    expected: 3
  - name: "already sorted"
    input: [[1, 2, 3, 4, 5]]
    expected: 0
  - name: "reverse sorted"
    input: [[5, 4, 3, 2, 1]]
    expected: 10
  - name: "single element"
    input: [[1]]
    expected: 0
  - name: "two elements inverted"
    input: [[2, 1]]
    expected: 1
  - name: "two elements sorted"
    input: [[1, 2]]
    expected: 0
  - name: "larger array"
    input: [[1, 5, 2, 6, 3, 7, 4]]
    expected: 6
  - name: "empty array"
    input: [[]]
    expected: 0
