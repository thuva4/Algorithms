algorithm: "run-length-encoding"
function_signature:
  name: "run_length_encoding"
  input: [array_of_integers]
  output: array_of_integers
test_cases:
  - name: "basic encoding"
    input: [[1, 1, 1, 2, 2, 3]]
    expected: [1, 3, 2, 2, 3, 1]
  - name: "no repetition"
    input: [[1, 2, 3, 4]]
    expected: [1, 1, 2, 1, 3, 1, 4, 1]
  - name: "all same"
    input: [[5, 5, 5, 5, 5]]
    expected: [5, 5]
  - name: "single element"
    input: [[7]]
    expected: [7, 1]
