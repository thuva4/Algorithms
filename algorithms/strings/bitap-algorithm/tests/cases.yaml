algorithm: "bitap-algorithm"
function_signature:
  name: "bitap_search"
  input: [text, pattern]
  output: first_index_or_negative_one
test_cases:
  - name: "pattern found"
    input: ["ABCDEFGH", "DEF"]
    expected: 3
  - name: "pattern not found"
    input: ["ABCDEF", "XYZ"]
    expected: -1
  - name: "pattern at start"
    input: ["ABCDEF", "ABC"]
    expected: 0
  - name: "pattern equals text"
    input: ["ABC", "ABC"]
    expected: 0
  - name: "single character match"
    input: ["ABCDE", "C"]
    expected: 2
  - name: "pattern at end"
    input: ["HELLO WORLD", "WORLD"]
    expected: 6
