algorithm: "interval-scheduling"
function_signature:
  name: "interval_scheduling"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "basic intervals"
    input: [[4, 1, 3, 2, 5, 4, 7, 6, 9]]
    expected: 2
  - name: "all overlapping"
    input: [[3, 1, 10, 2, 8, 3, 6]]
    expected: 1
  - name: "no overlapping"
    input: [[3, 1, 2, 3, 4, 5, 6]]
    expected: 3
  - name: "single interval"
    input: [[1, 0, 5]]
    expected: 1
