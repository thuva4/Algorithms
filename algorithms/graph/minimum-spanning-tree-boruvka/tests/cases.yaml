algorithm: "minimum-spanning-tree-boruvka"
function_signature:
  name: "minimum_spanning_tree_boruvka"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple triangle"
    input: [[3, 3, 0, 1, 1, 1, 2, 2, 0, 2, 3]]
    expected: 3
  - name: "four vertices"
    input: [[4, 5, 0, 1, 10, 0, 2, 6, 0, 3, 5, 1, 3, 15, 2, 3, 4]]
    expected: 19
  - name: "single edge"
    input: [[2, 1, 0, 1, 7]]
    expected: 7
  - name: "four vertices line"
    input: [[4, 3, 0, 1, 1, 1, 2, 2, 2, 3, 3]]
    expected: 6
