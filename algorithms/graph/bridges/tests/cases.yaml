algorithm: "bridges"
function_signature:
  name: "count_bridges"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "two bridges"
    input: [[5, 5, 0, 1, 1, 2, 2, 0, 1, 3, 3, 4]]
    expected: 2
  - name: "all bridges (linear)"
    input: [[4, 3, 0, 1, 1, 2, 2, 3]]
    expected: 3
  - name: "no bridges (triangle)"
    input: [[3, 3, 0, 1, 1, 2, 2, 0]]
    expected: 0
