algorithm: "a-star-search"
function_signature:
  name: "a_star_search"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple path"
    input: [[4, 5, 0, 1, 1, 0, 2, 4, 1, 2, 2, 1, 3, 6, 2, 3, 3, 0, 3, 5, 4, 2, 0]]
    expected: 6
  - name: "direct path"
    input: [[2, 1, 0, 1, 5, 0, 1, 5, 0]]
    expected: 5
  - name: "start equals goal"
    input: [[2, 1, 0, 1, 3, 0, 0, 0, 3]]
    expected: 0
  - name: "triangle - shorter indirect path"
    input: [[3, 3, 0, 1, 1, 0, 2, 10, 1, 2, 1, 0, 2, 2, 1, 0]]
    expected: 2
  - name: "grid-like 4 nodes"
    input: [[4, 4, 0, 1, 1, 0, 2, 1, 1, 3, 1, 2, 3, 1, 0, 3, 2, 1, 1, 0]]
    expected: 2
  - name: "no path exists"
    input: [[3, 1, 0, 1, 3, 0, 2, 5, 5, 0]]
    expected: -1
