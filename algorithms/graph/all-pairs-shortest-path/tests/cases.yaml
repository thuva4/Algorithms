algorithm: "all-pairs-shortest-path"
function_signature:
  name: "all_pairs_shortest_path"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple triangle"
    input: [[3, 3, 0, 1, 1, 1, 2, 2, 0, 2, 10]]
    expected: 3
  - name: "direct is shortest"
    input: [[2, 1, 0, 1, 5]]
    expected: 5
  - name: "four vertices"
    input: [[4, 5, 0, 1, 3, 0, 2, 8, 1, 2, 2, 1, 3, 5, 2, 3, 1]]
    expected: 6
  - name: "unreachable"
    input: [[3, 1, 1, 2, 4]]
    expected: -1
