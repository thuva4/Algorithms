algorithm: "max-flow-min-cut"
function_signature:
  name: "max_flow_min_cut"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple network"
    input: [[4, 5, 0, 3, 0,1,10, 0,2,10, 1,2,2, 1,3,4, 2,3,8]]
    expected: 12
  - name: "single edge"
    input: [[2, 1, 0, 1, 0,1,5]]
    expected: 5
  - name: "two parallel paths"
    input: [[4, 4, 0, 3, 0,1,3, 0,2,7, 1,3,3, 2,3,7]]
    expected: 10
  - name: "no path"
    input: [[3, 1, 0, 2, 0,1,5]]
    expected: 0
