algorithm: "kruskals-algorithm"
function_signature:
  name: "kruskal"
  input: [num_vertices, edges_list]
  output: mst_total_weight
test_cases:
  - name: "simple graph"
    input: [4, [[0, 1, 10], [0, 2, 6], [0, 3, 5], [1, 3, 15], [2, 3, 4]]]
    expected: 19
  - name: "single edge"
    input: [2, [[0, 1, 7]]]
    expected: 7
  - name: "triangle"
    input: [3, [[0, 1, 1], [1, 2, 2], [0, 2, 3]]]
    expected: 3
  - name: "four nodes square with diagonal"
    input: [4, [[0, 1, 1], [1, 2, 2], [2, 3, 3], [3, 0, 4], [0, 2, 5]]]
    expected: 6
  - name: "all equal weights"
    input: [3, [[0, 1, 5], [1, 2, 5], [0, 2, 5]]]
    expected: 10
  - name: "linear graph"
    input: [4, [[0, 1, 1], [1, 2, 2], [2, 3, 3]]]
    expected: 6
  - name: "star graph"
    input: [5, [[0, 1, 2], [0, 2, 3], [0, 3, 1], [0, 4, 4]]]
    expected: 10
  - name: "dense graph"
    input: [4, [[0, 1, 1], [0, 2, 4], [0, 3, 3], [1, 2, 2], [1, 3, 5], [2, 3, 6]]]
    expected: 6
