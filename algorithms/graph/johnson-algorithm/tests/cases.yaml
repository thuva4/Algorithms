algorithm: "johnson-algorithm"
function_signature:
  name: "johnson"
  input: [num_vertices, edges_list]
  output: all_pairs_shortest_distances
test_cases:
  - name: "simple graph"
    input: [4, [[0, 1, 1], [1, 2, 2], [2, 3, 3], [0, 3, 10]]]
    expected:
      "0": {"0": 0, "1": 1, "2": 3, "3": 6}
      "1": {"0": Infinity, "1": 0, "2": 2, "3": 5}
      "2": {"0": Infinity, "1": Infinity, "2": 0, "3": 3}
      "3": {"0": Infinity, "1": Infinity, "2": Infinity, "3": 0}
  - name: "single node"
    input: [1, []]
    expected:
      "0": {"0": 0}
  - name: "two nodes"
    input: [2, [[0, 1, 5]]]
    expected:
      "0": {"0": 0, "1": 5}
      "1": {"0": Infinity, "1": 0}
  - name: "negative weight edges"
    input: [3, [[0, 1, 3], [1, 2, -2], [0, 2, 5]]]
    expected:
      "0": {"0": 0, "1": 3, "2": 1}
      "1": {"0": Infinity, "1": 0, "2": -2}
      "2": {"0": Infinity, "1": Infinity, "2": 0}
  - name: "triangle"
    input: [3, [[0, 1, 1], [1, 2, 2], [0, 2, 4]]]
    expected:
      "0": {"0": 0, "1": 1, "2": 3}
      "1": {"0": Infinity, "1": 0, "2": 2}
      "2": {"0": Infinity, "1": Infinity, "2": 0}
  - name: "negative cycle detection"
    input: [3, [[0, 1, 1], [1, 2, -3], [2, 0, 1]]]
    expected: "negative_cycle"
  - name: "disconnected graph"
    input: [3, [[0, 1, 2]]]
    expected:
      "0": {"0": 0, "1": 2, "2": Infinity}
      "1": {"0": Infinity, "1": 0, "2": Infinity}
      "2": {"0": Infinity, "1": Infinity, "2": 0}
