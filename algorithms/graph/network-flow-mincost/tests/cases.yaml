algorithm: "network-flow-mincost"
function_signature:
  name: "network_flow_mincost"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple two path"
    input: [[4, 5, 0, 3, 0, 1, 2, 1, 0, 2, 2, 3, 1, 3, 1, 1, 2, 3, 1, 2, 1, 2, 1, 5]]
    expected: 7
  - name: "single path"
    input: [[3, 2, 0, 2, 0, 1, 5, 2, 1, 2, 5, 3]]
    expected: 25
  - name: "parallel edges"
    input: [[2, 2, 0, 1, 0, 1, 3, 1, 0, 1, 2, 4]]
    expected: 11
