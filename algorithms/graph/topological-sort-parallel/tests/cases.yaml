algorithm: "topological-sort-parallel"
function_signature:
  name: "topological_sort_parallel"
  input: [flat_array_of_integers]
  output: integer
test_cases:
  - name: "linear chain"
    input: [[4, 3, 0, 1, 1, 2, 2, 3]]
    expected: 4
  - name: "fully parallel"
    input: [[4, 0]]
    expected: 1
  - name: "diamond DAG"
    input: [[4, 4, 0, 1, 0, 2, 1, 3, 2, 3]]
    expected: 3
  - name: "single node"
    input: [[1, 0]]
    expected: 1
  - name: "two independent chains"
    input: [[4, 2, 0, 1, 2, 3]]
    expected: 2
  - name: "wide fan-out"
    input: [[5, 4, 0, 1, 0, 2, 0, 3, 0, 4]]
    expected: 2
  - name: "two nodes"
    input: [[2, 1, 0, 1]]
    expected: 2
  - name: "complex DAG"
    input: [[6, 6, 0, 2, 0, 3, 1, 3, 1, 4, 2, 5, 3, 5]]
    expected: 3
