algorithm: "minimum-cut-stoer-wagner"
function_signature:
  name: "minimum_cut_stoer_wagner"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "simple triangle"
    input: [[3, 3, 0, 1, 2, 1, 2, 3, 0, 2, 1]]
    expected: 3
  - name: "two nodes single edge"
    input: [[2, 1, 0, 1, 5]]
    expected: 5
  - name: "four node graph"
    input: [[4, 4, 0, 1, 1, 1, 2, 2, 2, 3, 3, 0, 3, 1]]
    expected: 2
  - name: "square with diag"
    input: [[4, 5, 0, 1, 3, 1, 2, 3, 2, 3, 3, 0, 3, 1, 0, 2, 5]]
    expected: 4
