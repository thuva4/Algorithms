algorithm: "bipartite-check"
function_signature:
  name: "is_bipartite"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "even cycle is bipartite"
    input: [[4, 4, 0, 1, 1, 2, 2, 3, 3, 0]]
    expected: 1
  - name: "odd cycle is not bipartite"
    input: [[3, 3, 0, 1, 1, 2, 2, 0]]
    expected: 0
  - name: "single edge is bipartite"
    input: [[2, 1, 0, 1]]
    expected: 1
  - name: "single vertex is bipartite"
    input: [[1, 0]]
    expected: 1
