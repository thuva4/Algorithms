algorithm: "longest-path"
function_signature:
  name: "longest_path"
  input: [weighted_adjacency_list, start_node]
  output: longest_distances_dict
test_cases:
  - name: "simple DAG"
    input: [{"0": [[1, 3], [2, 6]], "1": [[3, 4], [2, 4]], "2": [[3, 2]], "3": []}, 0]
    expected: {"0": 0, "1": 3, "2": 7, "3": 9}
  - name: "single node"
    input: [{"0": []}, 0]
    expected: {"0": 0}
  - name: "two nodes"
    input: [{"0": [[1, 5]], "1": []}, 0]
    expected: {"0": 0, "1": 5}
  - name: "linear chain"
    input: [{"0": [[1, 2]], "1": [[2, 3]], "2": [[3, 4]], "3": []}, 0]
    expected: {"0": 0, "1": 2, "2": 5, "3": 9}
  - name: "diamond DAG"
    input: [{"0": [[1, 1], [2, 2]], "1": [[3, 4]], "2": [[3, 3]], "3": []}, 0]
    expected: {"0": 0, "1": 1, "2": 2, "3": 5}
  - name: "multiple paths to same node"
    input: [{"0": [[1, 10], [2, 1]], "1": [[3, 1]], "2": [[3, 1]], "3": []}, 0]
    expected: {"0": 0, "1": 10, "2": 1, "3": 11}
  - name: "wide DAG"
    input: [{"0": [[1, 2], [2, 3], [3, 1]], "1": [], "2": [], "3": []}, 0]
    expected: {"0": 0, "1": 2, "2": 3, "3": 1}
  - name: "unreachable node"
    input: [{"0": [[1, 5]], "1": [], "2": []}, 0]
    expected: {"0": 0, "1": 5, "2": -Infinity}
