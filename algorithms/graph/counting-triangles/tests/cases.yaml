algorithm: "counting-triangles"
function_signature:
  name: "counting_triangles"
  input: [flat_array_of_integers]
  output: integer
test_cases:
  - name: "single triangle"
    input: [[3, 3, 0, 1, 1, 2, 0, 2]]
    expected: 1
  - name: "complete graph K4"
    input: [[4, 6, 0, 1, 0, 2, 0, 3, 1, 2, 1, 3, 2, 3]]
    expected: 4
  - name: "no triangles - line graph"
    input: [[4, 3, 0, 1, 1, 2, 2, 3]]
    expected: 0
  - name: "no triangles - star"
    input: [[4, 3, 0, 1, 0, 2, 0, 3]]
    expected: 0
  - name: "two triangles sharing edge"
    input: [[4, 5, 0, 1, 1, 2, 0, 2, 2, 3, 1, 3]]
    expected: 2
  - name: "single node"
    input: [[1, 0]]
    expected: 0
  - name: "two nodes one edge"
    input: [[2, 1, 0, 1]]
    expected: 0
  - name: "complete graph K5"
    input: [[5, 10, 0, 1, 0, 2, 0, 3, 0, 4, 1, 2, 1, 3, 1, 4, 2, 3, 2, 4, 3, 4]]
    expected: 10
