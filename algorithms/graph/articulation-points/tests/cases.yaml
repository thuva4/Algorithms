algorithm: "articulation-points"
function_signature:
  name: "articulation_points"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "two articulation points"
    input: [[5, 5, 0, 1, 1, 2, 2, 0, 1, 3, 3, 4]]
    expected: 2
  - name: "linear graph (two cut vertices)"
    input: [[4, 3, 0, 1, 1, 2, 2, 3]]
    expected: 2
  - name: "triangle (no articulation points)"
    input: [[3, 3, 0, 1, 1, 2, 2, 0]]
    expected: 0
