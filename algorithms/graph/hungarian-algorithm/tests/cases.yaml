algorithm: "hungarian-algorithm"
function_signature:
  name: "hungarian"
  input: [cost_matrix]
  output: assignment_and_cost
test_cases:
  - name: "2x2 identity cost"
    input:
      cost_matrix: [[1, 2], [2, 1]]
    expected:
      assignment: [0, 1]
      total_cost: 2
  - name: "3x3 simple"
    input:
      cost_matrix: [[9, 2, 7], [6, 4, 3], [5, 8, 1]]
    expected:
      assignment: [1, 0, 2]
      total_cost: 9
  - name: "3x3 all same"
    input:
      cost_matrix: [[5, 5, 5], [5, 5, 5], [5, 5, 5]]
    expected:
      assignment: [0, 1, 2]
      total_cost: 15
  - name: "1x1 trivial"
    input:
      cost_matrix: [[42]]
    expected:
      assignment: [0]
      total_cost: 42
  - name: "4x4 example"
    input:
      cost_matrix: [[10, 5, 13, 15], [3, 9, 18, 13], [13, 7, 4, 15], [12, 11, 14, 8]]
    expected:
      assignment: [1, 0, 2, 3]
      total_cost: 20
