algorithm: "heavy-light-decomposition"
function_signature:
  name: "hld_path_query"
  input: [n, edges, values, queries]
  output: query_results
test_cases:
  - name: "path max query"
    input:
      n: 5
      edges: [[0, 1], [0, 2], [1, 3], [1, 4]]
      values: [1, 5, 3, 2, 4]
      queries:
        - type: "max"
          u: 3
          v: 4
    expected: [5]
  - name: "path sum query on simple chain"
    input:
      n: 3
      edges: [[0, 1], [1, 2]]
      values: [1, 2, 3]
      queries:
        - type: "sum"
          u: 0
          v: 2
    expected: [6]
