algorithm: "segment-tree"
function_signature:
  name: "segment_tree_operations"
  input: [array, queries]
  output: query_results
test_cases:
  - name: "range sum query"
    input:
      array: [1, 3, 5, 7, 9, 11]
      queries:
        - type: "sum"
          left: 1
          right: 3
    expected: [15]
  - name: "point update and range query"
    input:
      array: [1, 3, 5, 7, 9, 11]
      queries:
        - type: "update"
          index: 1
          value: 10
        - type: "sum"
          left: 1
          right: 3
    expected: [22]
  - name: "single element query"
    input:
      array: [5, 8, 2]
      queries:
        - type: "sum"
          left: 0
          right: 0
    expected: [5]
  - name: "full range query"
    input:
      array: [1, 2, 3, 4, 5]
      queries:
        - type: "sum"
          left: 0
          right: 4
    expected: [15]
