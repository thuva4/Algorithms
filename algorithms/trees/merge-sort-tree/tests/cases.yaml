algorithm: "merge-sort-tree"
description: "Count elements <= k in range [l,r]"
function_signature:
  name: "merge_sort_tree"
  input: "n, array, queries (l, r, k)"
  output: "count for each query"
input_format: "n, a1..an, q, l1, r1, k1, ..., lq, rq, kq"
output_format: "q integers: count of elements <= k for each query"
test_cases:
  - name: "all elements <= k"
    input:
      n: 5
      array: [1, 2, 3, 4, 5]
      queries: [[0, 4, 5]]
    expected: [5]
  - name: "no elements <= k"
    input:
      n: 4
      array: [10, 20, 30, 40]
      queries: [[0, 3, 5]]
    expected: [0]
  - name: "multiple queries"
    input:
      n: 6
      array: [3, 1, 4, 1, 5, 9]
      queries: [[0, 5, 3], [1, 3, 2], [0, 2, 4]]
    expected: [3, 2, 3]
  - name: "single element range"
    input:
      n: 3
      array: [5, 2, 8]
      queries: [[0, 0, 5], [1, 1, 1], [2, 2, 10]]
    expected: [1, 0, 1]
  - name: "exact match"
    input:
      n: 4
      array: [1, 3, 3, 7]
      queries: [[0, 3, 3], [0, 3, 1], [0, 3, 7]]
    expected: [3, 1, 4]
