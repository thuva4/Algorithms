algorithm: "prufer-code"
function_signature:
  name: "prufer_encode"
  input: [n, edges]
  output: prufer_sequence
test_cases:
  - name: "simple tree with 4 nodes"
    input:
      n: 4
      edges: [[0, 1], [1, 2], [1, 3]]
    expected: [1, 1]
  - name: "star graph with 5 nodes"
    input:
      n: 5
      edges: [[0, 1], [0, 2], [0, 3], [0, 4]]
    expected: [0, 0, 0]
  - name: "path graph with 3 nodes"
    input:
      n: 3
      edges: [[0, 1], [1, 2]]
    expected: [1]
  - name: "two nodes"
    input:
      n: 2
      edges: [[0, 1]]
    expected: []
