algorithm: "avl-tree"
function_signature:
  name: "avl_insert_inorder"
  input: [array_of_integers]
  output: array_of_integers
test_cases:
  - name: "basic insertion"
    input: [[5, 3, 7, 1, 4]]
    expected: [1, 3, 4, 5, 7]
  - name: "left-left rotation"
    input: [[3, 2, 1]]
    expected: [1, 2, 3]
  - name: "sequential insertion"
    input: [[1, 2, 3, 4, 5]]
    expected: [1, 2, 3, 4, 5]
  - name: "single element"
    input: [[10]]
    expected: [10]
  - name: "two elements"
    input: [[2, 1]]
    expected: [1, 2]
  - name: "right-left rotation"
    input: [[3, 1, 2]]
    expected: [1, 2, 3]
  - name: "duplicates ignored"
    input: [[5, 3, 5, 7, 3]]
    expected: [3, 5, 7]
