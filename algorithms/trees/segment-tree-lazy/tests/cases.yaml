algorithm: "segment-tree-lazy"
description: "Range add updates and range sum queries"
function_signature:
  name: "segment_tree_lazy"
  input: "n, array, operations (type, l, r, v)"
  output: "array of query answers"
input_format: "n, a1..an, q, type1 l1 r1 v1 ... (type=1: add v to [l,r], type=2: sum [l,r], v=0 for queries)"
output_format: "answers for type=2 queries"
test_cases:
  - name: "simple query"
    input:
      n: 5
      array: [1, 2, 3, 4, 5]
      operations: [[2, 0, 4, 0]]
    expected: [15]
  - name: "update then query"
    input:
      n: 5
      array: [1, 2, 3, 4, 5]
      operations: [[1, 0, 2, 10], [2, 0, 4, 0]]
    expected: [45]
  - name: "multiple operations"
    input:
      n: 4
      array: [0, 0, 0, 0]
      operations: [[1, 0, 3, 5], [2, 0, 3, 0], [1, 1, 2, 3], [2, 1, 2, 0]]
    expected: [20, 16]
  - name: "single element updates"
    input:
      n: 3
      array: [1, 1, 1]
      operations: [[1, 0, 0, 9], [2, 0, 0, 0], [2, 0, 2, 0]]
    expected: [10, 12]
  - name: "partial range query"
    input:
      n: 6
      array: [1, 2, 3, 4, 5, 6]
      operations: [[2, 2, 4, 0], [1, 0, 5, 1], [2, 2, 4, 0]]
    expected: [12, 15]
