algorithm: "treap"
function_signature:
  name: "treap"
  input: [array_of_integers]
  output: array_of_integers
test_cases:
  - name: "basic insertion"
    input: [[5, 3, 8, 1, 2]]
    expected: [1, 2, 3, 5, 8]
  - name: "already sorted"
    input: [[1, 2, 3, 4, 5]]
    expected: [1, 2, 3, 4, 5]
  - name: "reverse order"
    input: [[9, 7, 5, 3, 1]]
    expected: [1, 3, 5, 7, 9]
  - name: "single element"
    input: [[10]]
    expected: [10]
