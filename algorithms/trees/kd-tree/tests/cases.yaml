algorithm: "kd-tree"
function_signature:
  name: "kd_tree"
  input: [data]
  output: squared_distance_to_nearest
test_cases:
  - name: "basic nearest neighbor"
    input:
      data: [3, 1, 2, 3, 4, 5, 6, 3, 3]
    expected: 1
  - name: "exact match"
    input:
      data: [2, 0, 0, 5, 5, 0, 0]
    expected: 0
  - name: "single point"
    input:
      data: [1, 3, 4, 0, 0]
    expected: 25
  - name: "query near second point"
    input:
      data: [2, 0, 0, 10, 10, 9, 9]
    expected: 2
  - name: "multiple equidistant"
    input:
      data: [4, 1, 0, 0, 1, -1, 0, 0, -1, 0, 0]
    expected: 1
