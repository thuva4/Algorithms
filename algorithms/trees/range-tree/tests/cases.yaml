algorithm: "range-tree"
function_signature:
  name: "range_tree"
  input: [data]
  output: count_in_range
test_cases:
  - name: "basic range count"
    input:
      data: [5, 1, 3, 5, 7, 9, 2, 6]
    expected: 2
  - name: "all points in range"
    input:
      data: [4, 2, 4, 6, 8, 1, 10]
    expected: 4
  - name: "no points in range"
    input:
      data: [3, 1, 2, 3, 10, 20]
    expected: 0
  - name: "boundary inclusive"
    input:
      data: [3, 5, 10, 15, 5, 15]
    expected: 3
  - name: "single point"
    input:
      data: [1, 42, 40, 45]
    expected: 1
