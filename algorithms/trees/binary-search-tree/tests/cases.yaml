algorithm: "binary-search-tree"
function_signature:
  name: "bst_inorder"
  input: [array_of_integers]
  output: array_of_integers
test_cases:
  - name: "balanced tree"
    input: [[5, 3, 7, 1, 4, 6, 8]]
    expected: [1, 3, 4, 5, 6, 7, 8]
  - name: "single element"
    input: [[1]]
    expected: [1]
  - name: "three elements"
    input: [[3, 1, 2]]
    expected: [1, 2, 3]
  - name: "duplicates"
    input: [[5, 5, 5]]
    expected: [5, 5, 5]
  - name: "empty array"
    input: [[]]
    expected: []
  - name: "already sorted ascending"
    input: [[1, 2, 3, 4, 5]]
    expected: [1, 2, 3, 4, 5]
  - name: "reverse sorted"
    input: [[5, 4, 3, 2, 1]]
    expected: [1, 2, 3, 4, 5]
  - name: "two elements"
    input: [[2, 1]]
    expected: [1, 2]
  - name: "negative numbers"
    input: [[0, -3, 5, -1, 2]]
    expected: [-3, -1, 0, 2, 5]
