algorithm: "kadanes"
function_signature:
  name: "kadane"
  input: [array_of_integers]
  output: max_subarray_sum
test_cases:
  - name: "mixed"
    input: [[-2, 1, -3, 4, -1, 2, 1, -5, 4]]
    expected: 6
  - name: "all positive"
    input: [[1, 2, 3, 4]]
    expected: 10
  - name: "all negative"
    input: [[-1, -2, -3]]
    expected: -1
  - name: "single element"
    input: [[5]]
    expected: 5
  - name: "single negative"
    input: [[-3]]
    expected: -3
