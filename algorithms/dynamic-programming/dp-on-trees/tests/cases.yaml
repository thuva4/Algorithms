algorithm: "dp-on-trees"
description: "Find maximum downward path sum in a tree with node values"
function_signature:
  name: "dp_on_trees"
  input: "n, values[], edges[]"
  output: max_path_sum
input_format: "First line: n. Second line: n values. Next n-1 lines: u v (0-indexed edges)."
output_format: "Single integer: maximum downward path sum."
test_cases:
  - name: "simple tree"
    input:
      n: 5
      values: [1, 2, -3, 4, 5]
      edges: [[0,1],[0,2],[1,3],[1,4]]
    expected: 8
  - name: "single node"
    input:
      n: 1
      values: [5]
      edges: []
    expected: 5
  - name: "all negative"
    input:
      n: 3
      values: [-1, -2, -3]
      edges: [[0,1],[0,2]]
    expected: -1
  - name: "linear tree"
    input:
      n: 4
      values: [1, 2, 3, 4]
      edges: [[0,1],[1,2],[2,3]]
    expected: 10
  - name: "negative root positive children"
    input:
      n: 3
      values: [-10, 20, 30]
      edges: [[0,1],[0,2]]
    expected: 30
