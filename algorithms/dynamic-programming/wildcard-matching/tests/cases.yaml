algorithm: "wildcard-matching"
function_signature:
  name: "wildcard_matching"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "exact match"
    input: [[3, 1, 2, 3, 3, 1, 2, 3]]
    expected: 1
  - name: "star matches all"
    input: [[3, 1, 2, 3, 1, 0]]
    expected: 1
  - name: "question mark match"
    input: [[3, 1, 2, 3, 3, 1, -1, 3]]
    expected: 1
  - name: "no match"
    input: [[2, 1, 2, 2, 3, 4]]
    expected: 0
  - name: "empty text with star"
    input: [[0, 1, 0]]
    expected: 1
