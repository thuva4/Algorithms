algorithm: "sos-dp"
description: "Compute sum over all submasks for each bitmask"
function_signature:
  name: "sos_dp"
  input: "n, f[] (array of 2^n integers)"
  output: "sos[] (array of 2^n integers)"
input_format: "First line: n. Second line: 2^n integers."
output_format: "Single line: 2^n integers (SOS values)."
test_cases:
  - name: "n=2"
    input:
      n: 2
      f: [1, 2, 3, 4]
    expected: [1, 3, 4, 10]
  - name: "n=1"
    input:
      n: 1
      f: [5, 3]
    expected: [5, 8]
  - name: "n=3 all ones"
    input:
      n: 3
      f: [1, 1, 1, 1, 1, 1, 1, 1]
    expected: [1, 2, 2, 4, 2, 4, 4, 8]
  - name: "n=2 zeros"
    input:
      n: 2
      f: [0, 0, 0, 0]
    expected: [0, 0, 0, 0]
  - name: "n=3 powers"
    input:
      n: 3
      f: [1, 2, 4, 8, 16, 32, 64, 128]
    expected: [1, 3, 5, 15, 17, 51, 85, 255]
