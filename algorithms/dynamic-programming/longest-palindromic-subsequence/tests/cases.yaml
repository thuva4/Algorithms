algorithm: "longest-palindromic-subsequence"
function_signature:
  name: "longest_palindromic_subsequence"
  input: [array_of_integers]
  output: integer
test_cases:
  - name: "full palindrome"
    input: [[1, 2, 3, 2, 1]]
    expected: 5
  - name: "no repeats"
    input: [[1, 2, 3, 4, 5]]
    expected: 1
  - name: "alternating palindrome"
    input: [[1, 2, 1, 2, 1]]
    expected: 5
  - name: "single element"
    input: [[1]]
    expected: 1
  - name: "two same"
    input: [[3, 3]]
    expected: 2
  - name: "two different"
    input: [[1, 2]]
    expected: 1
  - name: "longer example"
    input: [[1, 3, 5, 3, 1, 4]]
    expected: 5
