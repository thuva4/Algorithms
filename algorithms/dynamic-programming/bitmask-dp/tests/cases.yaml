algorithm: "bitmask-dp"
description: "Minimum cost assignment problem using bitmask DP"
function_signature:
  name: "bitmask_dp"
  input: "n, cost_matrix (n*n flat array)"
  output: min_cost
input_format: "First line: n. Next n lines: n integers each (cost matrix row)."
output_format: "Single integer: minimum assignment cost."
test_cases:
  - name: "2x2 simple"
    input:
      n: 2
      matrix: [[1, 2], [3, 4]]
    expected: 5
  - name: "3x3 optimal"
    input:
      n: 3
      matrix: [[9, 2, 7], [6, 4, 3], [5, 8, 1]]
    expected: 9
  - name: "1x1 trivial"
    input:
      n: 1
      matrix: [[42]]
    expected: 42
  - name: "3x3 identity"
    input:
      n: 3
      matrix: [[1, 100, 100], [100, 1, 100], [100, 100, 1]]
    expected: 3
  - name: "4x4 case"
    input:
      n: 4
      matrix: [[10, 5, 3, 8], [2, 7, 6, 4], [8, 1, 9, 3], [5, 4, 2, 7]]
    expected: 12
