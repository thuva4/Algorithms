algorithm: "dungeon-game"
function_signature:
  name: "dungeonGame"
  input: [grid_2d]
  output: min_initial_health
test_cases:
  - name: "standard 3x3 grid"
    input: [[[-2, -3, 3], [-5, -10, 1], [10, 30, -5]]]
    expected: 7
  - name: "single cell positive"
    input: [[[1]]]
    expected: 1
  - name: "single cell negative"
    input: [[[-5]]]
    expected: 6
  - name: "single cell zero"
    input: [[[0]]]
    expected: 1
  - name: "all positive"
    input: [[[1, 2], [3, 4]]]
    expected: 1
  - name: "single row"
    input: [[[-3, 5]]]
    expected: 4
