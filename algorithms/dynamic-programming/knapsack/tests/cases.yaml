algorithm: "knapsack"
function_signature:
  name: "knapsack"
  input: [weights, values, capacity]
  output: max_value
test_cases:
  - name: "standard"
    input: [[1, 3, 4, 5], [1, 4, 5, 7], 7]
    expected: 9
  - name: "zero capacity"
    input: [[1, 2, 3], [10, 20, 30], 0]
    expected: 0
  - name: "all fit"
    input: [[1, 2, 3], [10, 20, 30], 10]
    expected: 60
  - name: "single item fits"
    input: [[5], [10], 5]
    expected: 10
  - name: "single item too heavy"
    input: [[5], [10], 3]
    expected: 0
