algorithm: "longest-increasing-subsequence"
function_signature:
  name: "lis"
  input: [array_of_integers]
  output: integer_length
test_cases:
  - name: "standard"
    input: [[10, 9, 2, 5, 3, 7, 101, 18]]
    expected: 4
  - name: "all increasing"
    input: [[1, 2, 3, 4, 5]]
    expected: 5
  - name: "all decreasing"
    input: [[5, 4, 3, 2, 1]]
    expected: 1
  - name: "single element"
    input: [[1]]
    expected: 1
  - name: "empty"
    input: [[]]
    expected: 0
