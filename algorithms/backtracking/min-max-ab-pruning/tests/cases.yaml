algorithm: "min-max-ab-pruning"
function_signature:
  name: "minimax_ab"
  input: [tree_values, depth, is_maximizing]
  output: optimal_value
test_cases:
  - name: "simple game tree"
    input:
      tree_values: [3, 5, 2, 9, 12, 5, 23, 23]
      depth: 3
      is_maximizing: true
    expected: 12
  - name: "two-level tree"
    input:
      tree_values: [3, 5, 6, 9]
      depth: 2
      is_maximizing: true
    expected: 6
  - name: "single value"
    input:
      tree_values: [7]
      depth: 0
      is_maximizing: true
    expected: 7
